# ────────────────────────────────────────────────────────────────────────────
# CD (Continuous Deployment)  —  ECR 이미지 빌드/푸시 + ECS 배포 템플릿
#
# ⚠️ 안전장치 (실수로 배포되지 않도록):
#   1. 수동 트리거(workflow_dispatch)로만 실행됩니다. main 머지 시 자동 실행하려면
#      아래 `push` 주석을 해제하세요.
#   2. 실제 배포 잡은 리포지토리 변수 `ENABLE_CD == 'true'` 일 때만 동작합니다.
#      (기본값에서는 잡이 스킵되어 아무 것도 배포하지 않습니다.)
#   3. AWS 자격증명/리소스 이름은 GitHub Secrets/Variables 로 주입해야 합니다.
# ────────────────────────────────────────────────────────────────────────────
name: CD

on:
  workflow_dispatch:
    inputs:
      app:
        description: 배포할 애플리케이션
        required: true
        default: api-server
        type: choice
        options:
          - api-server
          - activity-worker
          - web-server
  # 자동 배포를 원하면 아래 주석을 해제하세요.
  # push:
  #   branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  deploy:
    name: Build image & deploy (${{ github.event.inputs.app }})
    runs-on: ubuntu-latest
    # 안전장치: 리포지토리 변수 ENABLE_CD 를 'true' 로 설정하기 전에는 실행되지 않습니다.
    if: ${{ vars.ENABLE_CD == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          APP: ${{ github.event.inputs.app }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg APP="$APP" \
            -t "$REGISTRY/$ECR_REPOSITORY:$APP-$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:$APP-latest" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$APP-$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:$APP-latest"

      - name: Deploy to Amazon ECS
        env:
          APP: ${{ github.event.inputs.app }}
        run: |
          # 새 이미지로 서비스를 강제 재배포합니다. (태스크 정의는 사전에 구성되어 있어야 함)
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$APP" \
            --force-new-deployment \
            --region "$AWS_REGION"
